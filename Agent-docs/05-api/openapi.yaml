components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    deviceAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Use `Device <device_token>`.
  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        maximum: 100
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
  schemas:
    RegisterRequest:
      type: object
      required:
      - email
      - verificationCode
      - password
      - nickname
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        nickname:
          type: string
        verificationCode:
          type: string
          minLength: 6
          maxLength: 6
          description: Short-lived email verification code stored in Redis.
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            accessToken:
              type: string
            refreshToken:
              type: string
        requestId:
          type: string
    SuccessResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            success:
              type: boolean
        requestId:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        nickname:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum:
          - USER
          - ADMIN
        currentSessionId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
    AgentPublicSummary:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        avatarUrl:
          type: string
          nullable: true
        status:
          type: string
          enum:
          - PUBLISHED
        version:
          type: string
        capabilities:
          $ref: '#/components/schemas/AgentCapabilities'
    AgentPublicDetail:
      allOf:
      - $ref: '#/components/schemas/AgentPublicSummary'
      - type: object
        properties:
          social:
            $ref: '#/components/schemas/AgentSocialGallery'
          voice:
            type: object
            additionalProperties: true
    AgentSocialGallery:
      type: object
      properties:
        galleryImages:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              alt:
                type: string
                nullable: true
              sortOrder:
                type: integer
                nullable: true
        galleryVideos:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              posterUrl:
                type: string
                nullable: true
              title:
                type: string
                nullable: true
              sortOrder:
                type: integer
                nullable: true
    AgentCapabilities:
      type: object
      properties:
        chat:
          type: boolean
        voice:
          type: boolean
        tools:
          type: array
          items:
            type: string
    AgentSession:
      type: object
      properties:
        id:
          type: string
        agent:
          $ref: '#/components/schemas/AgentPublicSummary'
        status:
          type: string
          enum:
          - ACTIVE
          - ARCHIVED
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Message:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum:
          - USER
          - ASSISTANT
          - SYSTEM
          - TOOL
          - ROBOT
        content:
          type: string
        contentType:
          type: string
          enum:
          - TEXT
          - VOICE_TRANSCRIPT
          - ROBOT_ACTION
          - SYSTEM_EVENT
          - ERROR
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    PageInfo:
      type: object
      properties:
        nextCursor:
          type: string
          nullable: true
        hasNextPage:
          type: boolean
    ChatRequest:
      type: object
      required:
      - agentSessionId
      - content
      properties:
        agentSessionId:
          type: string
        content:
          type: string
        clientMessageId:
          type: string
    RuntimeVoiceResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            runtimeEventId:
              type: string
            intent:
              type: string
            transcript:
              type: string
            messageId:
              type: string
            command:
              $ref: '#/components/schemas/RobotCommand'
            reply:
              type: object
              properties:
                text:
                  type: string
                audioUrl:
                  type: string
            userMessage:
              $ref: '#/components/schemas/Message'
            assistantMessage:
              $ref: '#/components/schemas/Message'
            audio:
              $ref: '#/components/schemas/RuntimeAudioInfo'
        requestId:
          type: string
    RuntimeEventRequest:
      type: object
      required:
      - source
      - type
      - payload
      properties:
        source:
          type: string
        type:
          type: string
        agentSessionId:
          type: string
        payload:
          type: object
          additionalProperties: true
    DevicePairingCodeRequest:
      type: object
      required:
      - deviceSn
      - deviceName
      - deviceType
      properties:
        deviceSn:
          type: string
        deviceName:
          type: string
        deviceType:
          type: string
        capabilities:
          type: object
          additionalProperties: true
    DeviceBindResult:
      type: object
      properties:
        deviceId:
          type: string
        deviceSn:
          type: string
        displayName:
          type: string
        deviceToken:
          type: string
        status:
          type: string
    DeviceConnectRequest:
      type: object
      required:
      - deviceSn
      - clientVersion
      properties:
        deviceSn:
          type: string
        clientVersion:
          type: string
        capabilities:
          type: object
          additionalProperties: true
    DeviceConnectResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            deviceId:
              type: string
            status:
              type: string
            user:
              type: object
              properties:
                id:
                  type: string
                nickname:
                  type: string
            currentSession:
              $ref: '#/components/schemas/AgentSession'
            websocketUrl:
              type: string
            serverTime:
              type: string
              format: date-time
        requestId:
          type: string
    DeviceHeartbeatRequest:
      type: object
      required:
      - deviceId
      - status
      properties:
        deviceId:
          type: string
        status:
          type: string
        battery:
          type: object
          additionalProperties: true
        network:
          type: object
          additionalProperties: true
    DeviceTelemetryRequest:
      type: object
      required:
      - deviceId
      - telemetry
      properties:
        deviceId:
          type: string
        telemetry:
          type: object
          additionalProperties: true
    Device:
      type: object
      properties:
        id:
          type: string
        deviceSn:
          type: string
        displayName:
          type: string
        deviceType:
          type: string
        status:
          type: string
        capabilities:
          type: object
          additionalProperties: true
        lastTelemetry:
          type: object
          additionalProperties: true
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
    RobotActionRequest:
      type: object
      required:
      - targetDeviceId
      - type
      - payload
      properties:
        agentSessionId:
          type: string
        targetDeviceId:
          type: string
        type:
          type: string
          enum:
          - MOVE
          - TURN
          - STOP
          - FOLLOW
          - DOCK
          - NAVIGATE
        payload:
          type: object
          additionalProperties: true
        safety:
          type: object
          additionalProperties: true
        timeoutMs:
          type: integer
    RobotCommand:
      type: object
      properties:
        commandId:
          type: string
        targetDeviceId:
          type: string
        type:
          type: string
        status:
          type: string
          enum:
          - QUEUED
          - SENT
          - ACCEPTED
          - RUNNING
          - DONE
          - FAILED
          - CANCELLED
          - REJECTED
          - TIMEOUT
        payload:
          type: object
          additionalProperties: true
        result:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
        requestId:
          type: string
    RuntimeAudioInfo:
      type: object
      properties:
        messageId:
          type: string
        tempUrl:
          type: string
        mimeType:
          type: string
          example: audio/mpeg
        storagePolicy:
          type: string
          enum:
          - CLIENT_PERSISTENT_INDEXEDDB
          - PLAY_AND_DISCARD
          - CLIENT_CACHE_OPTIONAL
        expiresIn:
          type: integer
          example: 600
    SendEmailCodeRequest:
      type: object
      required:
      - email
      - purpose
      properties:
        email:
          type: string
          format: email
        purpose:
          type: string
          enum:
          - REGISTER
    SendEmailCodeResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            success:
              type: boolean
            expiresIn:
              type: integer
              example: 300
            cooldownSeconds:
              type: integer
              example: 60
        requestId:
          type: string
    UserUsageSummary:
      type: object
      properties:
        balanceAgentTokens:
          type: integer
          format: int64
        usedAgentTokens:
          type: integer
          format: int64
        billingMode:
          type: string
          enum:
          - TRACK_ONLY
          - ENFORCE
        minimumTextBalance:
          type: integer
          example: 100
        minimumVoiceBalance:
          type: integer
          example: 1000
        canUseTextChat:
          type: boolean
        canUseVoiceChat:
          type: boolean
    BillingPricingResponse:
      type: object
      properties:
        currencyName:
          type: string
          example: Agent Tokens
        agentTokensPerRmb:
          type: integer
          example: 1000
        billingMultiplier:
          type: number
          format: float
          example: 1.5
        minimumTextBalance:
          type: integer
          example: 100
        minimumVoiceBalance:
          type: integer
          example: 1000
        voiceReplyMaxChars:
          type: integer
          example: 200
        rates:
          type: object
          properties:
            deepseek:
              type: object
              properties:
                inputCacheHitPerMillionTokensAgentTokens:
                  type: number
                  example: 30
                inputCacheMissPerMillionTokensAgentTokens:
                  type: number
                  example: 1500
                outputPerMillionTokensAgentTokens:
                  type: number
                  example: 3000
            elevenlabs:
              type: object
              properties:
                ttsPerCharacterAgentTokens:
                  type: number
                  example: 0.525
                ttsPer100CharactersAgentTokens:
                  type: number
                  example: 52.5
        examples:
          type: array
          items:
            type: object
            additionalProperties: true
    BillingPackagesResponse:
      type: object
      properties:
        packages:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: pkg_5000
              amountRmb:
                type: integer
                example: 5
              agentTokens:
                type: integer
                example: 5000
    CreateRechargeOrderRequest:
      type: object
      required:
      - packageId
      properties:
        packageId:
          type: string
          example: pkg_5000
    RechargeOrder:
      type: object
      properties:
        id:
          type: string
        orderNo:
          type: string
          example: RO202606280001
        amountRmb:
          type: number
          example: 5
        currency:
          type: string
          example: CNY
        agentTokens:
          type: integer
          format: int64
          example: 5000
        status:
          type: string
          enum:
          - PENDING
          - PAID
          - EXPIRED
        paymentProvider:
          type: string
          enum:
          - MOCK
          - WECHAT
          - ALIPAY
        paymentMethod:
          type: string
          enum:
          - MOCK
          - WECHAT_QR
          - ALIPAY_QR
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true
    RechargeOrderResponse:
      type: object
      properties:
        order:
          $ref: '#/components/schemas/RechargeOrder'
    RechargeOrderListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RechargeOrder'
        nextCursor:
          type: string
          nullable: true
    AgentTokenTransaction:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
          - RECHARGE
          - USAGE
          - ADMIN_RECHARGE
          - ADMIN_ADJUST
          - REFUND
          - GIFT
        direction:
          type: string
          enum:
          - CREDIT
          - DEBIT
        amountTokens:
          type: integer
          format: int64
        balanceBefore:
          type: integer
          format: int64
        balanceAfter:
          type: integer
          format: int64
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        operatorAdminId:
          type: string
          nullable: true
    RechargeOrderPayResponse:
      type: object
      properties:
        order:
          $ref: '#/components/schemas/RechargeOrder'
        balanceAgentTokens:
          type: integer
          format: int64
        transaction:
          $ref: '#/components/schemas/AgentTokenTransaction'
    AgentTokenTransactionListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgentTokenTransaction'
        nextCursor:
          type: string
          nullable: true
    AdminAdjustAgentTokensRequest:
      type: object
      required:
      - amountAgentTokens
      - reason
      properties:
        amountAgentTokens:
          type: integer
          minimum: 1
          example: 5000
        reason:
          type: string
          minLength: 2
          maxLength: 255
          example: 线下收款充值
    AdminAdjustAgentTokensResponse:
      type: object
      required:
      - userId
      - balanceBefore
      - amountAgentTokens
      - balanceAfter
      - transactionId
      properties:
        userId:
          type: string
        balanceBefore:
          type: integer
          format: int64
        amountAgentTokens:
          type: integer
          format: int64
        balanceAfter:
          type: integer
          format: int64
        transactionId:
          type: string
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data: {}
        message:
          type: string
        meta:
          type: object
        error:
          type: object
    RechargePackage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        amountRmb:
          type: number
        baseTokens:
          type: integer
        agentTokens:
          type: integer
        bonusTokens:
          type: integer
        discountPercent:
          type: number
        status:
          type: string
          enum:
          - ACTIVE
          - DISABLED
        sortOrder:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
