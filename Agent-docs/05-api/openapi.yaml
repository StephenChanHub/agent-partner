openapi: 3.0.3
info:
  title: Jarvis Platform API - v1.7.1 Studio UX & Pricing CRUD
  version: 1.7.2
  description: Jarvis Platform API Contract v1.7.1. Adds Agent Studio profile editor
    support and editable Pricing Packages CRUD in sandbox mode.
servers:
- url: /api/v1
security:
- bearerAuth: []
paths:
  /auth/email-code/send:
    post:
      tags:
      - Auth
      summary: Send registration email verification code
      description: V1 only supports REGISTER purpose. Verification code is stored
        in Redis with a short TTL and is not persisted in MySQL.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailCodeRequest'
      responses:
        '200':
          description: Email code sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailCodeResponse'
        '429':
          description: Rate limited
  /auth/register:
    post:
      tags:
      - Auth
      summary: Register user with email verification code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
      description: Creates a USER account after verifying a short-lived email code
        stored in Redis. V1 never creates admin accounts through registration.
  /auth/login:
    post:
      summary: Admin/User sandbox login
      tags:
      - Auth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
  /auth/refresh:
    post:
      tags:
      - Auth
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
                  requestId:
                    type: string
  /auth/logout:
    post:
      tags:
      - Auth
      summary: Logout user
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /me:
    get:
      summary: Current principal
      tags:
      - Auth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /agents:
    get:
      tags:
      - Agent
      summary: List published agents
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentPublicSummary'
                  pageInfo:
                    $ref: '#/components/schemas/PageInfo'
                  requestId:
                    type: string
  /agents/{slug}:
    get:
      tags:
      - Agent
      summary: Get public agent detail
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Agent detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentPublicDetail'
                  requestId:
                    type: string
  /agent-sessions:
    post:
      tags:
      - AgentSession
      summary: Open or create an agent session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - agentSlug
              properties:
                agentSlug:
                  type: string
      responses:
        '200':
          description: Agent session
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentSession'
                  requestId:
                    type: string
  /agent-sessions/current:
    get:
      tags:
      - AgentSession
      summary: Get current agent session
      responses:
        '200':
          description: Current agent session
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    nullable: true
                    allOf:
                    - $ref: '#/components/schemas/AgentSession'
                  requestId:
                    type: string
  /agent-sessions/{sessionId}:
    get:
      tags:
      - AgentSession
      summary: Get agent session detail
      parameters:
      - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Agent session detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentSession'
                  requestId:
                    type: string
  /agent-sessions/{sessionId}/messages:
    get:
      tags:
      - Message
      summary: List messages in session
      parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: direction
        in: query
        required: false
        schema:
          type: string
          enum:
          - before
          - after
          default: before
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
                  pageInfo:
                    $ref: '#/components/schemas/PageInfo'
                  requestId:
                    type: string
  /agent-sessions/{sessionId}/archive:
    patch:
      tags:
      - AgentSession
      summary: Archive session
      parameters:
      - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /chat:
    post:
      tags:
      - Runtime
      summary: Send text message and stream response with SSE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
      description: 'V1.6: Mock API enabled by default.'
  /voice:
    post:
      tags:
      - Runtime
      summary: Upload voice from device
      security:
      - deviceAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - audio
              properties:
                audio:
                  type: string
                  format: binary
                agentSessionId:
                  type: string
                format:
                  type: string
                sampleRate:
                  type: integer
      responses:
        '200':
          description: Runtime voice result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeVoiceResponse'
      description: 'V1.6: Mock API enabled by default.'
  /runtime/events:
    post:
      tags:
      - Runtime
      summary: Submit runtime event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeEventRequest'
      responses:
        '200':
          description: Runtime event accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      runtimeEventId:
                        type: string
                      intent:
                        type: string
                      status:
                        type: string
                  requestId:
                    type: string
  /devices/pairing-code:
    post:
      tags:
      - Device
      summary: Request device pairing code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevicePairingCodeRequest'
      responses:
        '200':
          description: Pairing code
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      pairingCode:
                        type: string
                      qrPayload:
                        type: string
                      expiresAt:
                        type: string
                        format: date-time
                  requestId:
                    type: string
  /devices/bind:
    post:
      tags:
      - Device
      summary: Bind device to current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - pairingCode
              properties:
                pairingCode:
                  type: string
                displayName:
                  type: string
      responses:
        '200':
          description: Device bound
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DeviceBindResult'
                  requestId:
                    type: string
  /devices/connect:
    post:
      tags:
      - Device
      summary: Device connects on startup
      security:
      - deviceAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceConnectRequest'
      responses:
        '200':
          description: Device connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceConnectResponse'
  /devices/heartbeat:
    post:
      tags:
      - Device
      summary: Device heartbeat
      security:
      - deviceAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceHeartbeatRequest'
      responses:
        '200':
          description: OK
  /devices/telemetry:
    post:
      tags:
      - Device
      summary: Device telemetry
      security:
      - deviceAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceTelemetryRequest'
      responses:
        '200':
          description: OK
  /devices:
    get:
      tags:
      - Device
      summary: List user devices
      responses:
        '200':
          description: Devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
                  requestId:
                    type: string
  /devices/{deviceId}:
    get:
      tags:
      - Device
      summary: Get device detail
      parameters:
      - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Device
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Device'
                  requestId:
                    type: string
    patch:
      tags:
      - Device
      summary: Update device display info
      parameters:
      - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
      responses:
        '200':
          description: Updated
    delete:
      tags:
      - Device
      summary: Unbind device
      parameters:
      - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Unbound
  /robot/actions:
    post:
      tags:
      - Robot
      summary: Create robot action command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RobotActionRequest'
      responses:
        '200':
          description: Command queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RobotCommand'
                  requestId:
                    type: string
  /robot/actions/{commandId}:
    get:
      tags:
      - Robot
      summary: Get robot command status
      parameters:
      - name: commandId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Command
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RobotCommand'
                  requestId:
                    type: string
  /robot/actions/{commandId}/cancel:
    post:
      tags:
      - Robot
      summary: Cancel robot command
      parameters:
      - name: commandId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Cancelled
  /robot/emergency-stop:
    post:
      tags:
      - Robot
      summary: Trigger emergency stop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - targetDeviceId
              properties:
                targetDeviceId:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: Emergency stop triggered
  /robot/emergency-stop/release:
    post:
      tags:
      - Robot
      summary: Release emergency stop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - targetDeviceId
              - confirm
              properties:
                targetDeviceId:
                  type: string
                confirm:
                  type: boolean
      responses:
        '200':
          description: Emergency stop released
  /studio/agents:
    get:
      summary: List Studio agents
      tags:
      - Studio Agents
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      summary: Create Studio agent draft
      tags:
      - Studio Agents
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
  /studio/agents/{agentId}:
    get:
      tags:
      - Studio
      summary: Get studio agent
      parameters:
      - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Studio agent
  /studio/agents/{agentId}/draft:
    patch:
      tags:
      - Studio
      summary: Update agent draft manifest
      parameters:
      - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - manifest
              properties:
                manifest:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Draft saved
  /studio/agents/{agentId}/publish:
    post:
      tags:
      - Studio
      summary: Publish agent version
      parameters:
      - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - version
              properties:
                version:
                  type: string
                releaseNote:
                  type: string
      responses:
        '200':
          description: Published
  /studio/agents/{agentId}/versions:
    get:
      tags:
      - Studio
      summary: List agent versions
      parameters:
      - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Versions
  /studio/agents/{agentId}/rollback:
    post:
      tags:
      - Studio
      summary: Rollback agent version
      parameters:
      - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - versionId
              properties:
                versionId:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: Rolled back
  /studio/model-profiles:
    get:
      summary: List Model Profiles
      tags:
      - Model Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      summary: Create Model Profile
      tags:
      - Model Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
  /studio/model-profiles/{id}:
    get:
      summary: Get Model Profile
      tags:
      - Model Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    patch:
      summary: Update Model Profile
      tags:
      - Model Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
  /studio/model-profiles/{id}/test:
    post:
      summary: Test Model Profile
      tags:
      - Model Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
  /studio/model-profiles/{id}/set-default:
    post:
      summary: Set default Model Profile
      tags:
      - Model Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /studio/voice-profiles:
    get:
      summary: List Voice Profiles
      tags:
      - Voice Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      summary: Create Voice Profile
      tags:
      - Voice Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
  /studio/voice-profiles/{id}:
    get:
      summary: Get Voice Profile
      tags:
      - Voice Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    patch:
      summary: Update Voice Profile
      tags:
      - Voice Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
  /studio/voice-profiles/{id}/test:
    post:
      summary: Test Voice Profile
      tags:
      - Voice Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
  /studio/voice-profiles/{id}/set-default:
    post:
      summary: Set default Voice Profile
      tags:
      - Voice Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /studio/voice-profiles/{id}/publish:
    post:
      summary: Publish Voice Profile
      tags:
      - Voice Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /studio/voice-profiles/{id}/disable:
    post:
      summary: Disable Voice Profile
      tags:
      - Voice Profiles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /studio/voice-profiles/{id}/preview-audio:
    post:
      summary: Reserved Voice Profile preview audio upload
      description: Reserved for future real upload. v1.7.2 Studio Web uses browser-only local audio preview and does not call this endpoint.
      tags:
      - Voice Profiles
      responses:
        '200':
          description: Reserved endpoint response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /studio/voice-profiles/sync-elevenlabs:
    post:
      summary: Sync ElevenLabs voices
      tags:
      - Studio Resource Library
      responses:
        '200':
          description: Sync result
  /me/usage:
    get:
      summary: Get current user Agent Tokens usage summary
      tags:
      - Usage
      responses:
        '200':
          description: Current user usage summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUsageSummary'
  /me/usage-records:
    get:
      summary: Get current user usage records
      tags:
      - Usage
      responses:
        '200':
          description: OK
  /studio/users/{id}/usage:
    get:
      summary: Get user usage summary
      tags:
      - Usage
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /studio/users/{id}/usage-records:
    get:
      summary: List user usage records
      tags:
      - Usage
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /studio/users/{id}/balance/adjust:
    post:
      summary: Adjust user token balance
      tags:
      - Studio
      - Usage
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      deprecated: true
      description: Deprecated from v1.5.10. Use POST /studio/users/{id}/tokens/adjust
        instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAdjustAgentTokensRequest'
  /runtime/audio/temp/{audioId}:
    get:
      tags:
      - Runtime
      summary: Get temporary runtime audio file
      parameters:
      - name: audioId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Temporary audio binary
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
          headers:
            Cache-Control:
              schema:
                type: string
              description: private, max-age=600
        '404':
          description: Audio expired or not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /billing/pricing:
    get:
      summary: Get Agent Tokens pricing
      tags:
      - Billing
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /billing/packages:
    get:
      summary: Get recharge packages
      tags:
      - Billing
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /billing/recharge-orders:
    post:
      summary: Create recharge order
      tags:
      - Billing
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
    get:
      summary: List current user visible recharge orders
      tags:
      - Billing
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /billing/recharge-orders/{id}:
    get:
      summary: Get recharge order
      tags:
